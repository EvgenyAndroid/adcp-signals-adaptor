name = "adcp-signals-adaptor"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT          = "production"
API_VERSION          = "3.0-rc"
EMBEDDING_ENGINE     = "llm"
LINKEDIN_REDIRECT_URI = "https://adcp-signals-adaptor.evgeny-193.workers.dev/auth/linkedin/callback"
# DEMO_API_KEY is provisioned via `wrangler secret put DEMO_API_KEY` — do NOT
# add it here. Checked-in vars land in the public Worker bundle, which makes
# a plaintext API key in [vars] equivalent to having no auth. Secrets are
# injected at runtime and never appear in the bundle.

[[d1_databases]]
binding       = "DB"
database_name = "adcp-signals-db"
database_id   = "70b0049e-7012-4c3a-8bd2-0f0a9c74d79c"

[[kv_namespaces]]
binding = "SIGNALS_CACHE"
id      = "e17c4c99b649460a92016e1257436f22"

[dev]
port           = 8787
local_protocol = "http"

# Sec-40: weekly D1 housekeeping purge.
# Schedule: Sundays 06:00 UTC (01:00 ET / 22:00 PT Saturday).
# The scheduled() handler in src/index.ts invokes runScheduledPurge which
# sweeps: dynamic signals (>7d), activation_jobs + events (>30d),
# mcp_tool_calls (>7d, matches ext.governance.audit_log.retention_days),
# and expired OAuth state. Canonical seeded/derived signals are preserved.
# Manual trigger available via POST /admin/purge (DEMO_API_KEY gated).
[triggers]
crons = ["0 6 * * SUN"]